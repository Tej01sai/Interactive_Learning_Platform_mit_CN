<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Routing Path-finding Game — NETLEARN">
<title>Routing Game — NETLEARN</title>
<link rel="stylesheet" href="style.css">
<style>
  .stat-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:8px 16px 0; }
  .stat-cell { background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; padding:8px; text-align:center; }
  .stat-cell .sv { font-family:var(--font-mono); font-size:18px; font-weight:500; }
  .stat-cell .sl { font-family:var(--font-display); font-size:8px; color:var(--text-muted); letter-spacing:0.1em; margin-top:2px; }
  .svg-canvas { display:block; width:100%; background:#050810; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .routing-table { margin:8px 16px 0; background:#050810; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .rt-header { display:grid; grid-template-columns:1fr 1fr 1fr; background:rgba(0,212,255,0.1); border-bottom:1px solid var(--border); }
  .rt-header span { font-family:var(--font-display); font-size:9px; color:var(--accent-blue); padding:8px 10px; letter-spacing:0.08em; }
  .rt-row { display:grid; grid-template-columns:1fr 1fr 1fr; border-bottom:1px solid rgba(0,212,255,0.05); }
  .rt-row:last-child { border-bottom:none; }
  .rt-row span { font-family:var(--font-mono); font-size:11px; color:var(--text-secondary); padding:7px 10px; }
  .rt-row.best span { color:var(--accent-green); }
  .controls-row { display:flex; gap:8px; padding:10px 16px 0; }
  .win-overlay { display:none; position:fixed; inset:0; background:rgba(10,14,26,0.94); z-index:300; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; }
  .win-overlay.show { display:flex; }
  .win-title { font-family:var(--font-display); font-size:24px; font-weight:900; letter-spacing:0.1em; margin-bottom:12px; }
  .win-sub { font-family:var(--font-body); font-size:15px; color:var(--text-secondary); margin-bottom:24px; }
</style>
</head>
<body>
<div class="screen">

  <div class="header" style="border-bottom-color:rgba(255,179,71,0.2)">
    <a href="index.html" class="back-btn" style="color:var(--accent-amber);border-color:rgba(255,179,71,0.2)">‹</a>
    <h1 style="color:var(--accent-amber);text-shadow:var(--glow-amber)">ROUTING GAME</h1>
  </div>

  <div style="padding:8px 16px 0;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;">
    <a href="learn_osi.html" class="chip">OSI</a>
    <a href="learn_ip.html" class="chip">IP</a>
    <a href="learn_topology.html" class="chip">Topology</a>
    <span class="chip active" style="background:rgba(255,179,71,0.1);border-color:rgba(255,179,71,0.4);color:var(--accent-amber)">Routing</span>
    <a href="learn_security.html" class="chip">Security</a>
  </div>

  <!-- Stats -->
  <div class="stat-strip">
    <div class="stat-cell">
      <div class="sv" id="hop-count" style="color:var(--accent-blue)">0</div>
      <div class="sl">HOPS</div>
    </div>
    <div class="stat-cell" style="position:relative">
      <div class="sv" id="timer-val" style="color:var(--accent-amber)">60</div>
      <div class="sl">SECONDS</div>
    </div>
    <div class="stat-cell">
      <div class="sv" id="score-val" style="color:var(--accent-green)">0</div>
      <div class="sl">SCORE</div>
    </div>
  </div>

  <!-- SVG Graph -->
  <svg id="svg-canvas" class="svg-canvas" height="260" viewBox="0 0 380 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-amber"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-green"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="glow-blue"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="380" height="260" fill="#050810"/>
    <g id="edges-g"></g>
    <g id="nodes-g"></g>
  </svg>

  <!-- Routing Table -->
  <div style="padding:6px 16px 0"><span class="card-title">ROUTING TABLE — CURRENT ROUTER</span></div>
  <div class="routing-table">
    <div class="rt-header"><span>DEST</span><span>NEXT HOP</span><span>COST</span></div>
    <div id="rt-body"></div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <button class="btn btn-terminal" onclick="revealPath()">⌖ REVEAL PATH</button>
    <button class="btn btn-amber" onclick="resetGame()" style="flex:1">↺ NEW GAME</button>
  </div>

  <div style="padding:8px 16px 0"><div id="game-msg" style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);min-height:20px"></div></div>

  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html"><div class="nav-icon">⬡</div><div class="nav-label">Learn</div></a>
    <a class="nav-item" href="tools_subnet.html"><div class="nav-icon">⚙</div><div class="nav-label">Tools</div></a>
    <a class="nav-item" href="quiz.html"><div class="nav-icon">◈</div><div class="nav-label">Quiz</div></a>
    <a class="nav-item" href="tutor.html"><div class="nav-icon">◎</div><div class="nav-label">Tutor</div></a>
  </nav>
</div>

<!-- Win/Lose overlay -->
<div class="win-overlay" id="win-overlay">
  <div id="win-content"></div>
</div>

<script src="utils.js"></script>
<script>
const GRAPH = {
  A:{B:2,C:5}, B:{A:2,D:1,E:3}, C:{A:5,F:2}, D:{B:1,G:4}, E:{B:3,F:1,H:2}, F:{C:2,E:1,H:3}, G:{D:4,H:1}, H:{E:2,F:3,G:1}
};

// Node positions (hardcoded for a good hexagonal feel)
const POS = {
  A:{x:50,y:130}, B:{x:130,y:80}, C:{x:130,y:190}, D:{x:210,y:50}, E:{x:210,y:130}, F:{x:210,y:210}, G:{x:300,y:80}, H:{x:300,y:170}
};

let currentRouter = 'A', destination = 'H', playerPath = ['A'], hops = 0, score = 0, revealed = false;
let timerInterval = null, timeLeft = 60;

function hexPoints(cx, cy, r) {
  return Array.from({length:6}, (_,i)=>{
    const a = Math.PI/180*(60*i-30);
    return `${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;
  }).join(' ');
}

function getEdgeState(a, b) {
  const inPath = playerPath.includes(a) && playerPath.includes(b);
  if (inPath) return 'visited';
  if (revealed) return 'reveal';
  return 'normal';
}

function renderGraph(revealPath=[]) {
  const eg = document.getElementById('edges-g');
  const ng = document.getElementById('nodes-g');
  eg.innerHTML = ''; ng.innerHTML = '';

  // Edges
  const drawn = new Set();
  Object.entries(GRAPH).forEach(([a, neighbors])=>{
    Object.entries(neighbors).forEach(([b, w])=>{
      const key = [a,b].sort().join('-');
      if (drawn.has(key)) return; drawn.add(key);
      const pa = POS[a], pb = POS[b];
      const mx = (pa.x+pb.x)/2, my = (pa.y+pb.y)/2;
      const inPlayerPath = playerPath.includes(a)&&playerPath.includes(b)&&Math.abs(playerPath.indexOf(a)-playerPath.indexOf(b))===1;
      const inReveal = revealPath.includes(a)&&revealPath.includes(b);
      let stroke = 'rgba(0,212,255,0.2)', width = 1.5, dash = '';
      if (inPlayerPath) { stroke='var(--accent-blue)'; width=2.5; }
      else if (inReveal) { stroke='var(--accent-green)'; width=2; }
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',pa.x); line.setAttribute('y1',pa.y); line.setAttribute('x2',pb.x); line.setAttribute('y2',pb.y);
      line.setAttribute('stroke',stroke); line.setAttribute('stroke-width',width);
      if(dash) line.setAttribute('stroke-dasharray',dash);
      eg.appendChild(line);
      // Weight badge
      const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      bg.setAttribute('x',mx-7); bg.setAttribute('y',my-7); bg.setAttribute('width',14); bg.setAttribute('height',12); bg.setAttribute('rx',3); bg.setAttribute('fill','#111827'); bg.setAttribute('stroke','rgba(0,212,255,0.15)'); bg.setAttribute('stroke-width','0.5');
      const wt = document.createElementNS('http://www.w3.org/2000/svg','text');
      wt.setAttribute('x',mx); wt.setAttribute('y',my+2); wt.setAttribute('text-anchor','middle'); wt.setAttribute('dominant-baseline','central');
      wt.setAttribute('font-size','8'); wt.setAttribute('fill','rgba(120,139,168,0.9)'); wt.setAttribute('font-family','JetBrains Mono,monospace'); wt.textContent=w;
      eg.appendChild(bg); eg.appendChild(wt);
    });
  });

  // Nodes
  Object.keys(POS).forEach(id=>{
    const p = POS[id];
    const isCurrent = id===currentRouter, isDest = id===destination;
    const inPath = playerPath.includes(id)&&!isCurrent;
    const inReveal = revealPath.includes(id);
    let stroke='rgba(0,212,255,0.3)', fill='rgba(0,212,255,0.06)', filter='', textColor='rgba(0,212,255,0.6)';
    if (isCurrent) { stroke='var(--accent-amber)'; fill='rgba(255,179,71,0.15)'; filter='url(#glow-amber)'; textColor='var(--accent-amber)'; }
    else if (isDest) { stroke='var(--accent-green)'; fill='rgba(57,255,20,0.12)'; filter='url(#glow-green)'; textColor='var(--accent-green)'; }
    else if (inPath) { stroke='var(--accent-blue)'; fill='rgba(0,212,255,0.12)'; filter='url(#glow-blue)'; textColor='var(--accent-blue)'; }
    else if (inReveal) { stroke='rgba(57,255,20,0.4)'; fill='rgba(57,255,20,0.05)'; }
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('filter',filter);
    const hex = document.createElementNS('http://www.w3.org/2000/svg','polygon');
    hex.setAttribute('points',hexPoints(p.x,p.y,16)); hex.setAttribute('fill',fill); hex.setAttribute('stroke',stroke); hex.setAttribute('stroke-width','1.5');
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x',p.x); label.setAttribute('y',p.y+1); label.setAttribute('text-anchor','middle'); label.setAttribute('dominant-baseline','central');
    label.setAttribute('font-size','11'); label.setAttribute('fill',textColor); label.setAttribute('font-family','Orbitron,monospace'); label.setAttribute('font-weight','700');
    label.textContent = id;
    g.appendChild(hex); g.appendChild(label);
    // Clickable overlay
    if (!isCurrent && GRAPH[currentRouter][id] !== undefined) {
      hex.style.cursor='pointer'; hex.addEventListener('click',()=>playerHop(id));
      label.style.cursor='pointer'; label.addEventListener('click',()=>playerHop(id));
    }
    ng.appendChild(g);
  });
}

function playerHop(id) {
  if (revealed) return;
  if (GRAPH[currentRouter][id] === undefined) {
    flashMsg('✗ Not adjacent to current router. Choose a connected node.', 'var(--accent-red)'); return;
  }
  currentRouter = id; playerPath.push(id); hops++;
  document.getElementById('hop-count').textContent = hops;
  renderGraph();
  buildRoutingTable(currentRouter);
  if (id === destination) {
    const { dist } = dijkstra(GRAPH, playerPath[0]);
    const optimal = dist[destination];
    const earned = Math.max(0, 100 - (hops - (playerPath.length-1)) * 10);
    score += earned;
    document.getElementById('score-val').textContent = score;
    clearInterval(timerInterval);
    showWin(hops, optimal, earned);
    sendToApp({type:'topicDone',topic:'routing'});
    try{ localStorage.setItem('progress_routing','100'); }catch(e){}
  }
}

function showWin(hops, optimal, earned) {
  const isOptimal = hops === optimal;
  const overlay = document.getElementById('win-overlay');
  const content = document.getElementById('win-content');
  content.innerHTML = `
    <div class="win-title" style="color:${isOptimal?'var(--accent-green)':'var(--accent-blue)'}">${isOptimal?'✓ OPTIMAL ROUTE!':'✓ DELIVERED!'}</div>
    <div class="win-sub">Packet reached ${destination} in ${hops} hops.<br>Optimal path: ${optimal} hops. +${earned} pts</div>
    <button class="btn ${isOptimal?'btn-secondary':'btn-primary'} btn-full" onclick="resetGame();document.getElementById('win-overlay').classList.remove('show')">PLAY AGAIN</button>
  `;
  overlay.classList.add('show');
}

function revealPath() {
  revealed = true;
  const { prev } = dijkstra(GRAPH, playerPath[0]);
  const path = buildPath(prev, destination);
  flashMsg('Shortest path: ' + path.join(' → ') + ' (cost: ' + dijkstra(GRAPH, playerPath[0]).dist[destination] + ')', 'var(--accent-green)');
  renderGraph(path);
}

function buildRoutingTable(router) {
  const { dist, prev } = dijkstra(GRAPH, router);
  const body = document.getElementById('rt-body');
  body.innerHTML = Object.keys(GRAPH).filter(d=>d!==router).map(d=>{
    let nextHop = d; let cur = d;
    while (prev[cur] && prev[cur] !== router) cur = prev[cur];
    if (prev[cur] === router) nextHop = cur;
    return `<div class="rt-row${d===destination?' best':''}"><span>${d}</span><span>${dist[d]===Infinity?'—':nextHop}</span><span>${dist[d]===Infinity?'∞':dist[d]}</span></div>`;
  }).join('');
}

function flashMsg(msg, color) {
  const m = document.getElementById('game-msg');
  m.style.color = color; m.textContent = msg;
  setTimeout(()=>{ m.textContent=''; }, 4000);
}

function startTimer() {
  clearInterval(timerInterval); timeLeft = 60;
  document.getElementById('timer-val').textContent = timeLeft;
  timerInterval = setInterval(()=>{
    timeLeft--;
    document.getElementById('timer-val').textContent = timeLeft;
    document.getElementById('timer-val').style.color = timeLeft<=10 ? 'var(--accent-red)' : 'var(--accent-amber)';
    if (timeLeft <= 0) { clearInterval(timerInterval); showTimeout(); }
  }, 1000);
}

function showTimeout() {
  const overlay = document.getElementById('win-overlay');
  document.getElementById('win-content').innerHTML = `<div class="win-title" style="color:var(--accent-red)">⏱ TIME UP</div><div class="win-sub">Packet dropped! The route to ${destination} was not found in time.</div><button class="btn btn-danger btn-full" onclick="resetGame();document.getElementById('win-overlay').classList.remove('show')">TRY AGAIN</button>`;
  overlay.classList.add('show');
}

function resetGame() {
  const keys = Object.keys(POS);
  currentRouter = keys[Math.floor(Math.random()*keys.length)];
  do { destination = keys[Math.floor(Math.random()*keys.length)]; } while(destination === currentRouter);
  playerPath = [currentRouter]; hops = 0; revealed = false;
  document.getElementById('hop-count').textContent = 0;
  document.getElementById('game-msg').textContent = `Route packet from ${currentRouter} → ${destination}`;
  renderGraph(); buildRoutingTable(currentRouter); startTimer();
}

resetGame();
</script>
</body>
</html>
