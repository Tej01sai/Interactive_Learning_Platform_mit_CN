<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Subnet Calculator — NETLEARN Network Tools">
<title>Subnet Calculator — NETLEARN</title>
<link rel="stylesheet" href="style.css">
<style>
  .tools-tabs { display:flex; gap:0; padding:8px 16px 0; }
  .tools-tab { flex:1; text-align:center; padding:10px 2px; font-family:var(--font-display); font-size:8px; font-weight:700; letter-spacing:0.06em; color:var(--text-muted); border-bottom:2px solid var(--bg-tertiary); cursor:pointer; transition:all 0.25s; }
  .tools-tab.active { color:var(--accent-blue); border-bottom-color:var(--accent-blue); }
  .octet-inputs { display:flex; align-items:center; gap:4px; padding:12px 16px; }
  .oct-in { width:60px; text-align:center; font-family:var(--font-mono); font-size:18px; padding:10px 4px; background:var(--bg-tertiary); border:1.5px solid var(--border); border-radius:8px; color:var(--accent-blue); outline:none; transition:all 0.25s; }
  .oct-in:focus { border-color:var(--accent-blue); box-shadow:var(--glow-blue); }
  .oct-dot { font-family:var(--font-mono); font-size:16px; color:var(--text-muted); }
  .cidr-row { display:flex; align-items:center; gap:10px; padding:0 16px 8px; }
  .cidr-label { font-family:var(--font-display); font-size:9px; color:var(--text-muted); letter-spacing:0.1em; }
  .cidr-badge { font-family:var(--font-mono); font-size:18px; color:var(--accent-amber); min-width:48px; text-shadow:0 0 10px rgba(255,179,71,0.5); }
  .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 16px; }
  .res-card { background:var(--bg-secondary); border:1px solid var(--border); border-radius:12px; padding:14px 12px; transition:all 0.25s; }
  .res-card:hover { border-color:var(--accent-blue); box-shadow:var(--glow-blue); }
  .res-label { font-family:var(--font-display); font-size:8px; color:var(--text-muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:6px; }
  .res-value { font-family:var(--font-mono); font-size:13px; color:var(--accent-blue); font-weight:500; text-shadow:0 0 8px rgba(0,212,255,0.4); word-break:break-all; line-height:1.3; }
  .res-card.large .res-value { font-size:20px; color:var(--accent-green); text-shadow:0 0 12px rgba(57,255,20,0.5); }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
  input[type=number] { -moz-appearance:textfield; }
</style>
</head>
<body>
<div class="screen">

  <div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <h1>NETWORK TOOLS</h1>
  </div>

  <div class="tools-tabs">
    <div class="tools-tab active">SUBNET</div>
    <a href="tools_ipclass.html" class="tools-tab" style="text-decoration:none">IP CLASS</a>
    <a href="tools_bandwidth.html" class="tools-tab" style="text-decoration:none">BANDWIDTH</a>
  </div>

  <div style="padding:12px 16px 4px"><span class="card-title">SUBNET CALCULATOR</span></div>

  <!-- IP input -->
  <div class="octet-inputs">
    <input class="oct-in" type="number" min="0" max="255" value="192" id="o0" oninput="clamp(this);calcSubnet()">
    <span class="oct-dot">.</span>
    <input class="oct-in" type="number" min="0" max="255" value="168" id="o1" oninput="clamp(this);calcSubnet()">
    <span class="oct-dot">.</span>
    <input class="oct-in" type="number" min="0" max="255" value="1" id="o2" oninput="clamp(this);calcSubnet()">
    <span class="oct-dot">.</span>
    <input class="oct-in" type="number" min="0" max="255" value="0" id="o3" oninput="clamp(this);calcSubnet()">
  </div>

  <!-- CIDR Slider -->
  <div class="cidr-row">
    <span class="cidr-label">PREFIX LENGTH</span>
    <input type="range" min="8" max="30" value="24" id="cidr" oninput="calcSubnet()" style="flex:1">
    <span class="cidr-badge" id="cidr-val">/24</span>
  </div>

  <!-- Results -->
  <div class="result-grid">
    <div class="res-card">
      <div class="res-label">Network Address</div>
      <div class="res-value" id="r-net">192.168.1.0</div>
    </div>
    <div class="res-card" style="border-color:rgba(255,179,71,0.2)">
      <div class="res-label">Broadcast</div>
      <div class="res-value" id="r-bcast" style="color:var(--accent-amber)">192.168.1.255</div>
    </div>
    <div class="res-card" style="border-color:rgba(57,255,20,0.15)">
      <div class="res-label">First Host</div>
      <div class="res-value" id="r-first" style="color:var(--accent-green)">192.168.1.1</div>
    </div>
    <div class="res-card" style="border-color:rgba(57,255,20,0.15)">
      <div class="res-label">Last Host</div>
      <div class="res-value" id="r-last" style="color:var(--accent-green)">192.168.1.254</div>
    </div>
    <div class="res-card large">
      <div class="res-label">Total Hosts</div>
      <div class="res-value" id="r-hosts">254</div>
    </div>
    <div class="res-card" style="border-color:rgba(255,179,71,0.2)">
      <div class="res-label">Subnet Mask</div>
      <div class="res-value" id="r-mask" style="color:var(--accent-amber);font-size:12px">255.255.255.0</div>
    </div>
  </div>

  <!-- Wildcard + Class -->
  <div style="padding:10px 16px 0;display:flex;gap:8px;flex-wrap:wrap">
    <div style="flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:10px 12px">
      <div class="res-label">Wildcard Mask</div>
      <div class="res-value" id="r-wildcard" style="font-size:12px;color:var(--text-secondary)">0.0.0.255</div>
    </div>
    <div style="flex:1;background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;padding:10px 12px">
      <div class="res-label">IP Class</div>
      <div class="res-value" id="r-class" style="font-size:18px">C</div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="index.html"><div class="nav-icon">⬡</div><div class="nav-label">Learn</div></a>
    <a class="nav-item active" href="tools_subnet.html"><div class="nav-icon">⚙</div><div class="nav-label">Tools</div></a>
    <a class="nav-item" href="quiz.html"><div class="nav-icon">◈</div><div class="nav-label">Quiz</div></a>
    <a class="nav-item" href="tutor.html"><div class="nav-icon">◎</div><div class="nav-label">Tutor</div></a>
  </nav>
</div>

<script src="utils.js"></script>
<script>
function clamp(el) { let v=parseInt(el.value); if(isNaN(v)) v=0; el.value=Math.max(0,Math.min(255,v)); }
function calcSubnet() {
  const octets = [0,1,2,3].map(i=>parseInt(document.getElementById('o'+i).value)||0);
  const prefix = parseInt(document.getElementById('cidr').value);
  document.getElementById('cidr-val').textContent = '/'+prefix;
  const d = getSubnetDetails(octets, prefix);
  document.getElementById('r-net').textContent = d.network;
  document.getElementById('r-bcast').textContent = d.broadcast;
  document.getElementById('r-first').textContent = d.firstHost;
  document.getElementById('r-last').textContent = d.lastHost;
  document.getElementById('r-hosts').textContent = d.totalHosts.toLocaleString();
  document.getElementById('r-mask').textContent = d.mask;
  // Wildcard
  const maskParts = d.mask.split('.').map(Number);
  document.getElementById('r-wildcard').textContent = maskParts.map(p=>255-p).join('.');
  // Class
  const cls = getClass(octets[0]);
  document.getElementById('r-class').textContent = cls;
}
calcSubnet();
</script>
</body>
</html>
