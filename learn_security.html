<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Network Security Lab — NETLEARN">
<title>Security Lab — NETLEARN</title>
<link rel="stylesheet" href="style.css">
<style>
  .sec-tabs { display:flex; gap:0; padding:8px 16px 0; }
  .sec-tab { flex:1; text-align:center; padding:10px 4px; font-family:var(--font-display); font-size:9px; font-weight:700; letter-spacing:0.08em; color:var(--text-muted); border-bottom:2px solid var(--bg-tertiary); cursor:pointer; transition:all 0.25s; }
  .sec-tab.active { color:var(--accent-red); border-bottom-color:var(--accent-red); }
  .scenario-card { margin:10px 16px 0; background:rgba(255,69,96,0.05); border:1px solid rgba(255,69,96,0.25); border-radius:var(--radius-card); padding:16px; }
  .scenario-card.correct { border-color:rgba(57,255,20,0.3); background:rgba(57,255,20,0.05); animation:glowPulseGreen 1.5s 1; }
  .scenario-card.wrong { border-color:rgba(255,69,96,0.5); background:rgba(255,69,96,0.08); animation:glowPulseRed 1.5s 1; }
  .threat-icon { font-size:24px; margin-bottom:6px; }
  .scenario-title { font-family:var(--font-display); font-size:12px; font-weight:700; color:var(--accent-red); letter-spacing:0.06em; margin-bottom:8px; }
  .scenario-text { font-family:var(--font-body); font-size:14px; color:var(--text-primary); line-height:1.6; margin-bottom:12px; }
  .choice-btn { width:100%; text-align:left; padding:12px 14px; margin-bottom:8px; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; font-family:var(--font-body); font-size:13px; color:var(--text-primary); cursor:pointer; transition:all 0.25s; line-height:1.4; }
  .choice-btn:hover { border-color:rgba(255,69,96,0.4); background:rgba(255,69,96,0.05); }
  .choice-btn.correct { border-color:var(--accent-green); background:rgba(57,255,20,0.1); color:var(--accent-green); }
  .choice-btn.wrong { border-color:var(--accent-red); background:rgba(255,69,96,0.1); color:var(--accent-red); animation:shake 0.4s; }
  .choice-btn.partial { border-color:var(--accent-amber); background:rgba(255,179,71,0.1); color:var(--accent-amber); }
  .outcome-text { font-family:var(--font-mono); font-size:12px; padding:10px 12px; border-radius:8px; margin-top:4px; margin-bottom:4px; }
  .score-track { display:flex; align-items:center; gap:8px; padding:8px 16px 0; }
  .score-track .st-label { font-family:var(--font-display); font-size:9px; color:var(--text-muted); letter-spacing:0.1em; }
  .score-track .st-val { font-family:var(--font-mono); font-size:14px; color:var(--accent-green); flex:1; }
  .section-content { display:none; padding-bottom:80px; }
  .section-content.active { display:block; }
  .enc-panels { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 16px 0; }
  .enc-panel { background:#050810; border:1px solid rgba(0,212,255,0.15); border-radius:10px; padding:12px; }
  .enc-panel-label { font-family:var(--font-display); font-size:9px; color:var(--text-muted); letter-spacing:0.1em; margin-bottom:8px; }
  .enc-text { font-family:var(--font-mono); font-size:13px; min-height:44px; word-break:break-all; line-height:1.5; }
  .fw-table { margin:8px 16px 0; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .fw-header { display:grid; grid-template-columns:60px 1fr 70px 70px; background:rgba(0,212,255,0.08); border-bottom:1px solid var(--border); }
  .fw-header span { font-family:var(--font-display); font-size:8px; color:var(--accent-blue); padding:8px 6px; letter-spacing:0.06em; }
  .fw-row { display:grid; grid-template-columns:60px 1fr 70px 70px; border-bottom:1px solid rgba(0,212,255,0.05); align-items:center; }
  .fw-row input, .fw-row select { background:transparent; border:none; font-family:var(--font-mono); font-size:11px; color:var(--text-secondary); padding:6px 4px; outline:none; width:100%; }
  .fw-row select option { background:var(--bg-secondary); }
  .fw-action-allow { color:var(--accent-green); }
  .fw-action-deny { color:var(--accent-red); }
  .test-result { margin:8px 16px 0; padding:10px 14px; border-radius:8px; font-family:var(--font-mono); font-size:12px; display:none; }
</style>
</head>
<body>
<div class="screen">

  <div class="header" style="border-bottom-color:rgba(255,69,96,0.2)">
    <a href="index.html" class="back-btn" style="color:var(--accent-red);border-color:rgba(255,69,96,0.2)">‹</a>
    <h1 style="color:var(--accent-red);text-shadow:var(--glow-red)">SECURITY LAB</h1>
    <div id="score-display" style="font-family:var(--font-mono);font-size:12px;color:var(--accent-green)">0/6</div>
  </div>

  <!-- Section tabs -->
  <div class="sec-tabs">
    <div class="sec-tab active" onclick="showSection('scenarios')">SCENARIOS</div>
    <div class="sec-tab" onclick="showSection('encryption')">ENCRYPTION</div>
    <div class="sec-tab" onclick="showSection('firewall')">FIREWALL</div>
  </div>

  <!-- SCENARIOS -->
  <div class="section-content active" id="sec-scenarios">
    <div class="score-track">
      <span class="st-label">SCENARIO</span>
      <span class="st-val" id="sc-num">1 / 6</span>
      <div class="progress-wrap" style="flex:2"><div class="progress-bar" id="sc-progress" style="width:0%;background:var(--accent-red)"></div></div>
    </div>
    <div class="scenario-card" id="scenario-card">
      <div class="threat-icon">⚠</div>
      <div class="scenario-title" id="sc-title">SSH BRUTE FORCE</div>
      <div class="scenario-text" id="sc-text"></div>
      <div id="choices-area"></div>
    </div>
    <div style="padding:10px 16px 0">
      <button class="btn btn-outline btn-full" id="next-btn" onclick="nextScenario()" style="display:none">NEXT SCENARIO ▶</button>
    </div>
  </div>

  <!-- ENCRYPTION -->
  <div class="section-content" id="sec-encryption">
    <div style="padding:10px 16px 0"><span class="card-title">CAESAR CIPHER DEMO</span></div>
    <div style="padding:0 16px">
      <textarea id="plain-input" class="input" style="height:60px;resize:none;font-family:var(--font-mono)" placeholder="Type a message..." oninput="updateCipher()">HELLO NETWORK</textarea>
    </div>
    <div style="padding:6px 16px 0;display:flex;align-items:center;gap:10px">
      <span style="font-family:var(--font-display);font-size:9px;color:var(--text-muted);letter-spacing:0.1em">SHIFT</span>
      <input type="range" min="1" max="25" value="3" id="shift-slider" oninput="updateCipher()" style="flex:1">
      <span id="shift-val" style="font-family:var(--font-mono);font-size:14px;color:var(--accent-amber);min-width:24px">3</span>
    </div>
    <div class="enc-panels">
      <div class="enc-panel">
        <div class="enc-panel-label">PLAINTEXT</div>
        <div class="enc-text" id="plain-out" style="color:var(--accent-blue)">HELLO NETWORK</div>
      </div>
      <div class="enc-panel">
        <div class="enc-panel-label">CIPHERTEXT</div>
        <div class="enc-text" id="cipher-out" style="color:var(--accent-green)">KHOOR QHWZRUN</div>
      </div>
    </div>
    <div style="padding:10px 16px 0"><span class="card-title">AES BLOCK VISUALIZATION</span></div>
    <div style="padding:0 16px 0;display:grid;grid-template-columns:repeat(4,1fr);gap:4px" id="aes-grid"></div>
    <button class="btn btn-ghost btn-full" style="margin:10px 16px 0;width:calc(100% - 32px)" onclick="shuffleAES()">⟳ SHUFFLE BLOCK</button>
  </div>

  <!-- FIREWALL -->
  <div class="section-content" id="sec-firewall">
    <div style="padding:10px 16px 0"><span class="card-title">FIREWALL RULES</span></div>
    <div class="fw-table">
      <div class="fw-header"><span>PROTO</span><span>SRC IP</span><span>PORT</span><span>ACTION</span></div>
      <div id="fw-rules"></div>
    </div>
    <div style="padding:8px 16px 0;display:flex;gap:8px">
      <button class="btn btn-ghost" onclick="addRule()" style="flex:1">+ ADD RULE</button>
      <button class="btn btn-danger" onclick="clearRules()">CLEAR</button>
    </div>
    <div style="padding:10px 16px 0"><span class="card-title">TEST A PACKET</span></div>
    <div style="padding:0 16px;display:grid;grid-template-columns:1fr 80px 80px;gap:8px">
      <input class="input" id="test-ip" placeholder="IP (e.g. 10.0.0.1)" style="font-size:13px">
      <input class="input" id="test-port" placeholder="Port" type="number" style="font-size:13px">
      <input class="input" id="test-proto" placeholder="TCP" style="font-size:13px" value="TCP">
    </div>
    <button class="btn btn-primary btn-full" style="margin:8px 16px 0;width:calc(100% - 32px)" onclick="testPacket()">TEST PACKET</button>
    <div class="test-result" id="test-result"></div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html"><div class="nav-icon">⬡</div><div class="nav-label">Learn</div></a>
    <a class="nav-item" href="tools_subnet.html"><div class="nav-icon">⚙</div><div class="nav-label">Tools</div></a>
    <a class="nav-item" href="quiz.html"><div class="nav-icon">◈</div><div class="nav-label">Quiz</div></a>
    <a class="nav-item" href="tutor.html"><div class="nav-icon">◎</div><div class="nav-label">Tutor</div></a>
  </nav>
</div>

<script src="utils.js"></script>
<script>
// ── Scenarios ──────────────────────────────────────────────
const SCENARIOS = [
  { title:'SSH BRUTE FORCE', text:'Suspicious traffic from 10.0.0.99 on port 22. 500 failed login attempts in 60 seconds. What do you do?', choices:[
    {label:'Block the IP with a firewall rule', outcome:'correct', text:'✓ Smart! Rate-limiting and IP block stops the attack.'},
    {label:'Ignore — probably a bug', outcome:'wrong', text:'✗ The attacker gained root access. Always investigate anomalies.'},
    {label:'Disable SSH entirely', outcome:'partial', text:'⚠ Effective but cuts off legitimate admin access. Use key-based auth instead.'}
  ]},
  { title:'PHISHING EMAIL', text:'An employee clicks: "Update your VPN credentials now" — link goes to vpn-c0mpany.net', choices:[
    {label:'Train employees + add email filtering', outcome:'correct', text:'✓ Defense-in-depth: user awareness + technical controls.'},
    {label:'Just change the password', outcome:'wrong', text:'✗ Credentials already stolen. Attacker has access.'},
    {label:'Block the domain at DNS level', outcome:'partial', text:'⚠ Good quick response, but others may still fall for similar attacks.'}
  ]},
  { title:'MAN-IN-THE-MIDDLE', text:'Packet analysis shows ARP replies claiming the default gateway MAC has changed to a new address.', choices:[
    {label:'Enable dynamic ARP inspection on switch', outcome:'correct', text:'✓ DAI validates ARP packets against DHCP snooping table.'},
    {label:'Restart all network equipment', outcome:'wrong', text:'✗ Attacker reconnects after restart. Root cause not fixed.'},
    {label:'Switch to static ARP tables', outcome:'partial', text:'⚠ Works but impractical to maintain on large networks.'}
  ]},
  { title:'DDOS ATTACK', text:'Your web server receives 1 million packets/sec from thousands of IPs. CPU at 100%.', choices:[
    {label:'Rate-limiting + contact ISP for upstream filtering', outcome:'correct', text:'✓ Best: block at ISP level before traffic hits your network.'},
    {label:'Block all incoming traffic', outcome:'wrong', text:'✗ Legitimate users also blocked — site effectively down.'},
    {label:'Add more servers', outcome:'partial', text:'⚠ Scaling helps short-term but expensive and does not stop attack source.'}
  ]},
  { title:'ROGUE ACCESS POINT', text:'A new WiFi SSID "CompanyNet-Free" appears in the office. Employees are connecting to it.', choices:[
    {label:'Scan for rogue APs + implement 802.1X authentication', outcome:'correct', text:'✓ Wireless IDS detects rogues; 802.1X prevents unauthorized device association.'},
    {label:'Change the real network password', outcome:'wrong', text:'✗ Employees still connect to rogue AP.'},
    {label:'Disable WiFi for all employees', outcome:'partial', text:'⚠ Removes attack surface but severely limits productivity.'}
  ]},
  { title:'SQL INJECTION', text:'Login form sends: SELECT * FROM users WHERE username=\'\'OR 1=1-- and the database returns all records.', choices:[
    {label:'Use parameterized queries + input validation', outcome:'correct', text:'✓ Prepared statements prevent injection by separating code from data.'},
    {label:'Add a CAPTCHA to the login form', outcome:'wrong', text:'✗ CAPTCHA stops bots but not SQL injection attacks.'},
    {label:'Encrypt the database', outcome:'partial', text:'⚠ Encryption at rest does not help — attacker queries via the application layer.'}
  ]}
];

let scIndex = 0, scScore = 0, answered = false;

function renderScenario() {
  const s = SCENARIOS[scIndex];
  document.getElementById('sc-title').textContent = s.title;
  document.getElementById('sc-text').textContent = s.text;
  document.getElementById('sc-num').textContent = `${scIndex+1} / ${SCENARIOS.length}`;
  document.getElementById('sc-progress').style.width = ((scIndex)/SCENARIOS.length*100)+'%';
  document.getElementById('next-btn').style.display = 'none';
  const card = document.getElementById('scenario-card');
  card.className = 'scenario-card';
  const area = document.getElementById('choices-area');
  area.innerHTML = s.choices.map((c,i)=>`<button class="choice-btn" id="ch-${i}" onclick="chooseAnswer(${i})">${c.label}</button>`).join('');
  answered = false;
}

function chooseAnswer(i) {
  if (answered) return;
  answered = true;
  const s = SCENARIOS[scIndex];
  const ch = s.choices[i];
  const card = document.getElementById('scenario-card');
  s.choices.forEach((_,j)=>{
    const btn = document.getElementById('ch-'+j);
    const oc = s.choices[j].outcome;
    btn.className = 'choice-btn ' + oc;
    btn.insertAdjacentHTML('beforeend', `<div class="outcome-text" style="background:${oc==='correct'?'rgba(57,255,20,0.06)':oc==='wrong'?'rgba(255,69,96,0.06)':'rgba(255,179,71,0.06)'}">${s.choices[j].text}</div>`);
    btn.disabled = true;
  });
  if (ch.outcome === 'correct') { scScore++; card.classList.add('correct'); }
  else card.classList.add('wrong');
  document.getElementById('score-display').textContent = scScore+'/'+SCENARIOS.length;
  if (scIndex < SCENARIOS.length-1) document.getElementById('next-btn').style.display='block';
  else { document.getElementById('next-btn').textContent = '↺ RESTART'; document.getElementById('next-btn').style.display='block'; }
  if (scScore === SCENARIOS.length) { sendToApp({type:'topicDone',topic:'security'}); try{localStorage.setItem('progress_security','100');}catch(e){} }
}

function nextScenario() {
  scIndex = (scIndex+1) % SCENARIOS.length;
  renderScenario();
}

// ── Caesar Cipher ──────────────────────────────────────────
function caesarCipher(text, shift) {
  return text.toUpperCase().split('').map(c=>{
    if(c>='A'&&c<='Z') return String.fromCharCode(((c.charCodeAt(0)-65+shift)%26)+65);
    return c;
  }).join('');
}

function updateCipher() {
  const text = document.getElementById('plain-input').value.toUpperCase();
  const shift = parseInt(document.getElementById('shift-slider').value);
  document.getElementById('shift-val').textContent = shift;
  document.getElementById('plain-out').textContent = text || 'TYPE ABOVE...';
  document.getElementById('cipher-out').textContent = text ? caesarCipher(text,shift) : '...';
}

// AES hex grid
const HEX_CHARS = '0123456789ABCDEF';
function randHex(n=2){ return Array.from({length:n},()=>HEX_CHARS[Math.floor(Math.random()*16)]).join(''); }
function shuffleAES() {
  const grid = document.getElementById('aes-grid');
  grid.innerHTML = Array.from({length:16},(_,i)=>`<div style="background:${i%2?'rgba(0,212,255,0.06)':'rgba(0,212,255,0.03)'};border:1px solid rgba(0,212,255,0.1);border-radius:4px;padding:6px 2px;text-align:center;font-family:var(--font-mono);font-size:11px;color:var(--accent-blue)">${randHex()}</div>`).join('');
}

// ── Firewall ───────────────────────────────────────────────
let fwRules = [
  {proto:'TCP', src:'*', port:'80', action:'ALLOW'},
  {proto:'TCP', src:'*', port:'443', action:'ALLOW'},
  {proto:'*', src:'*', port:'*', action:'DENY'}
];

function renderFWRules() {
  document.getElementById('fw-rules').innerHTML = fwRules.map((r,i)=>`
    <div class="fw-row">
      <select onchange="fwRules[${i}].proto=this.value" style="color:var(--text-secondary)"><option${r.proto==='TCP'?' selected':''}>TCP</option><option${r.proto==='UDP'?' selected':''}>UDP</option><option${r.proto==='*'?' selected':''}>*</option></select>
      <input value="${r.src}" onchange="fwRules[${i}].src=this.value" placeholder="*">
      <input value="${r.port}" onchange="fwRules[${i}].port=this.value" placeholder="*">
      <select onchange="fwRules[${i}].action=this.value" class="fw-action-${r.action.toLowerCase()}"><option${r.action==='ALLOW'?' selected':''}>ALLOW</option><option${r.action==='DENY'?' selected':''}>DENY</option></select>
    </div>`).join('');
}

function addRule() { fwRules.push({proto:'TCP',src:'*',port:'*',action:'ALLOW'}); renderFWRules(); }
function clearRules() { fwRules=[{proto:'*',src:'*',port:'*',action:'DENY'}]; renderFWRules(); }

function testPacket() {
  const ip = document.getElementById('test-ip').value.trim() || '*';
  const port = document.getElementById('test-port').value.trim() || '*';
  const proto = document.getElementById('test-proto').value.trim().toUpperCase() || 'TCP';
  const res = document.getElementById('test-result');
  let matched = null;
  for (const r of fwRules) {
    const pMatch = r.proto==='*' || r.proto===proto;
    const sMatch = r.src==='*' || r.src===ip;
    const portMatch = r.port==='*' || r.port===port;
    if (pMatch&&sMatch&&portMatch) { matched=r; break; }
  }
  const action = matched ? matched.action : 'DENY';
  res.style.display='block';
  res.style.background = action==='ALLOW'?'rgba(57,255,20,0.08)':'rgba(255,69,96,0.08)';
  res.style.border = `1px solid ${action==='ALLOW'?'rgba(57,255,20,0.3)':'rgba(255,69,96,0.3)'}`;
  res.style.color = action==='ALLOW'?'var(--accent-green)':'var(--accent-red)';
  res.textContent = `${action==='ALLOW'?'✓ ALLOWED':'✗ DENIED'} — ${proto} from ${ip}:${port} → Rule: ${matched?`${matched.proto} ${matched.src}:${matched.port}`:'default deny'}`;
}

function showSection(id) {
  document.querySelectorAll('.section-content').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.sec-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  event.target.classList.add('active');
}

// Init
renderScenario();
updateCipher();
shuffleAES();
renderFWRules();
</script>
</body>
</html>
