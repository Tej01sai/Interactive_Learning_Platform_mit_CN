<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="OSI & TCP/IP Model interactive simulation — NETLEARN">
<title>OSI Simulation — NETLEARN</title>
<link rel="stylesheet" href="style.css">
<style>
  .topic-nav { padding:10px 16px 0; overflow-x:auto; display:flex; gap:8px; scrollbar-width:none; }
  .topic-nav::-webkit-scrollbar { display:none; }
  .step-info { font-family:var(--font-mono); font-size:11px; color:var(--accent-blue); text-align:right; padding:8px 16px 0; letter-spacing:0.05em; }
  .mode-row { display:flex; gap:8px; padding:10px 16px; }
  .mode-pill { flex:1; text-align:center; padding:8px; border-radius:var(--radius-pill); font-family:var(--font-display); font-size:10px; font-weight:700; letter-spacing:0.08em; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-muted); cursor:pointer; transition:all 0.25s; }
  .mode-pill.active { background:rgba(0,212,255,0.12); border-color:var(--accent-blue); color:var(--accent-blue); box-shadow:0 0 10px rgba(0,212,255,0.2); }
  .sim-area { padding:0 12px; display:grid; grid-template-columns:1fr 44px 1fr; gap:6px; align-items:start; }
  .col-label { font-family:var(--font-display); font-size:9px; font-weight:700; color:var(--text-muted); letter-spacing:0.16em; text-align:center; padding:8px 0 6px; }
  .layer-card { border-radius:10px; padding:9px 10px; background:var(--bg-secondary); border:1px solid var(--border); border-left:3px solid; margin-bottom:4px; cursor:pointer; transition:all 0.25s ease; position:relative; }
  .layer-card.active { background:rgba(0,212,255,0.06); transform:scale(1.02); box-shadow:0 0 14px rgba(0,212,255,0.3); }
  .layer-card.challenge-break { border-color:var(--accent-red)!important; background:rgba(255,69,96,0.08)!important; animation:glowPulseRed 1.5s infinite; }
  .layer-num { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); }
  .layer-name { font-family:var(--font-display); font-size:9px; font-weight:700; color:var(--text-primary); letter-spacing:0.04em; }
  .layer-pdu { font-family:var(--font-mono); font-size:8px; color:var(--text-muted); }
  .cloud-col { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; min-height:280px; }
  .cloud-circle { width:36px; height:80px; border:2px dashed rgba(0,212,255,0.4); border-radius:50%; display:flex; align-items:center; justify-content:center; animation:glowPulse 2.5s infinite; }
  .cloud-label { font-family:var(--font-mono); font-size:7px; color:var(--accent-blue); text-align:center; letter-spacing:0.08em; writing-mode:vertical-rl; }
  .packet-viz { padding:10px 16px; overflow-x:auto; display:flex; gap:4px; scrollbar-width:none; min-height:38px; align-items:center; }
  .packet-viz::-webkit-scrollbar { display:none; }
  .pkt-seg { font-family:var(--font-mono); font-size:10px; padding:4px 8px; border-radius:6px; white-space:nowrap; border:1px solid; animation:fadeSlideUp 0.3s ease; }
  .info-panel { margin:10px 16px; background:#050810; border:1px solid rgba(57,255,20,0.2); border-radius:10px; padding:12px; min-height:70px; }
  .info-panel .ip-header { font-family:var(--font-mono); font-size:9px; color:var(--text-muted); margin-bottom:8px; letter-spacing:0.1em; }
  .info-panel .ip-text { font-family:var(--font-mono); font-size:12px; color:var(--accent-green); line-height:1.6; }
  .controls { display:flex; gap:8px; padding:10px 16px 0; }
  .challenge-overlay { display:none; position:fixed; inset:0; background:rgba(10,14,26,0.92); z-index:300; flex-direction:column; align-items:center; justify-content:center; }
  .challenge-overlay.show { display:flex; }
  .challenge-result { border-radius:var(--radius-card); padding:32px; text-align:center; max-width:300px; }
  .challenge-result h2 { font-family:var(--font-display); font-size:20px; font-weight:900; margin-bottom:12px; letter-spacing:0.08em; }
  .challenge-result p { font-family:var(--font-body); font-size:15px; color:var(--text-secondary); margin-bottom:20px; }
</style>
</head>
<body>
<div class="screen">

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <h1>OSI SIMULATION</h1>
    <div id="step-counter" class="step-info">STEP 0 / 15</div>
  </div>

  <!-- Topic pills -->
  <div class="topic-nav">
    <span class="chip active">OSI</span>
    <a href="learn_ip.html" class="chip">IP</a>
    <a href="learn_topology.html" class="chip">Topology</a>
    <a href="learn_routing.html" class="chip">Routing</a>
    <a href="learn_security.html" class="chip">Security</a>
  </div>

  <!-- Mode toggle -->
  <div class="mode-row">
    <button class="mode-pill active" id="osi-btn" onclick="setModel('osi')">OSI 7-LAYER</button>
    <button class="mode-pill" id="tcpip-btn" onclick="setModel('tcpip')">TCP/IP 4-LAYER</button>
    <button class="mode-pill" id="challenge-btn" onclick="startChallenge()" style="border-color:rgba(255,69,96,0.3);color:var(--accent-red);">⚡ CHALLENGE</button>
  </div>

  <!-- Simulation area -->
  <div class="sim-area" id="sim-area">
    <div>
      <div class="col-label">SENDER</div>
      <div id="sender-layers"></div>
    </div>
    <div class="cloud-col">
      <div class="cloud-circle"></div>
      <div class="cloud-label">NET⬡WORK</div>
    </div>
    <div>
      <div class="col-label">RECEIVER</div>
      <div id="receiver-layers"></div>
    </div>
  </div>

  <!-- Packet visualizer -->
  <div style="padding:6px 16px 0"><span class="card-title">PACKET HEADERS</span></div>
  <div class="packet-viz" id="packet-viz"></div>

  <!-- Info panel -->
  <div class="info-panel">
    <div class="ip-header">● ● ●&nbsp;&nbsp;LAYER INFO</div>
    <div class="ip-text" id="info-text">Tap NEXT to begin packet transmission simulation.</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-terminal" onclick="prevStep()" id="btn-back" disabled>◀ BACK</button>
    <button class="btn btn-primary" onclick="nextStep()" id="btn-next" style="flex:2">NEXT ▶</button>
    <button class="btn btn-ghost" onclick="resetSim()">↺</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html"><div class="nav-icon">⬡</div><div class="nav-label">Learn</div></a>
    <a class="nav-item" href="tools_subnet.html"><div class="nav-icon">⚙</div><div class="nav-label">Tools</div></a>
    <a class="nav-item" href="quiz.html"><div class="nav-icon">◈</div><div class="nav-label">Quiz</div></a>
    <a class="nav-item" href="tutor.html"><div class="nav-icon">◎</div><div class="nav-label">Tutor</div></a>
  </nav>
</div>

<!-- Challenge overlay -->
<div class="challenge-overlay" id="challenge-overlay">
  <div class="challenge-result" id="challenge-result"></div>
</div>

<script src="utils.js"></script>
<script>
const OSI_LAYERS = [
  { id:7, name:'Application',  pdu:'Data',    color:'#9D8BF4', header:'[APP]',  info:'User data created here. HTTP, FTP, DNS protocols operate at this layer.' },
  { id:6, name:'Presentation', pdu:'Data',    color:'#4ADE80', header:'[PRES]', info:'Encrypts & encodes data. SSL/TLS, JPEG, ASCII conversion happen here.' },
  { id:5, name:'Session',      pdu:'Data',    color:'#F472B6', header:'[SESS]', info:'Opens, manages, and terminates communication sessions between applications.' },
  { id:4, name:'Transport',    pdu:'Segment', color:'#FB923C', header:'[TCP]',  info:'Adds port numbers and sequence numbers. TCP provides reliability, UDP is fast.' },
  { id:3, name:'Network',      pdu:'Packet',  color:'#FBBF24', header:'[IP]',   info:'Adds source & destination IP addresses. Routers operate at this layer.' },
  { id:2, name:'Data Link',    pdu:'Frame',   color:'#60A5FA', header:'[MAC]',  info:'Adds MAC address and CRC error check. Switches operate at this layer.' },
  { id:1, name:'Physical',     pdu:'Bits',    color:'#A3E635', header:'[BITS]', info:'Converts the frame into electrical, light, or radio signals for transmission.' }
];

const TCPIP_LAYERS = [
  { id:4, name:'Application',    pdu:'Data',    color:'#9D8BF4', header:'[APP+PRES+SESS]', info:'Combines OSI App, Presentation & Session. HTTP, FTP, SMTP, DNS.' },
  { id:3, name:'Transport',      pdu:'Segment', color:'#FB923C', header:'[TCP/UDP]',       info:'Same as OSI Transport — TCP for reliability, UDP for speed.' },
  { id:2, name:'Internet',       pdu:'Packet',  color:'#FBBF24', header:'[IP+ICMP]',       info:'Equivalent to OSI Network layer. IP addressing, ICMP, ARP.' },
  { id:1, name:'Network Access', pdu:'Frame',   color:'#60A5FA', header:'[MAC+BITS]',      info:'Combines OSI Data Link and Physical layers. Ethernet, WiFi.' }
];

let currentModel = 'osi';
let step = 0;
let challengeMode = false;
let challengeLayer = null;
let layers = [];

function setModel(model) {
  currentModel = model;
  document.getElementById('osi-btn').classList.toggle('active', model==='osi');
  document.getElementById('tcpip-btn').classList.toggle('active', model==='tcpip');
  layers = model === 'osi' ? OSI_LAYERS : TCPIP_LAYERS;
  resetSim();
}

function buildLayerHTML(layers, side, activeStep) {
  const maxStep = layers.length;
  return layers.map((l, i) => {
    let isActive = false;
    if (side === 'sender' && activeStep >= 1 && activeStep <= maxStep) {
      // sender goes top to bottom (layer 7 → 1), step 1 = layer 7
      isActive = activeStep === (i + 1);
    } else if (side === 'receiver' && activeStep > maxStep + 1) {
      // receiver goes bottom to top (layer 1 → 7)
      const recvStep = activeStep - maxStep - 1;
      isActive = recvStep === (maxStep - i);
    }
    const breakClass = challengeMode && challengeLayer === l.id ? 'challenge-break' : '';
    const activeClass = isActive ? 'active' : '';
    return `<div class="layer-card ${activeClass} ${breakClass}" style="border-left-color:${l.color}" data-layer="${l.id}" onclick="handleLayerClick(${l.id})">
      <div class="layer-num">L${l.id}</div>
      <div class="layer-name">${l.name.toUpperCase()}</div>
      <div class="layer-pdu">${l.pdu}</div>
    </div>`;
  }).join('');
}

function renderStep(s) {
  layers = currentModel === 'osi' ? OSI_LAYERS : TCPIP_LAYERS;
  const maxStep = layers.length;
  const total = maxStep * 2 + 1;
  document.getElementById('step-counter').textContent = `STEP ${s} / ${total}`;
  document.getElementById('sender-layers').innerHTML = buildLayerHTML(layers, 'sender', s);
  document.getElementById('receiver-layers').innerHTML = buildLayerHTML(layers, 'receiver', s);

  // Packet viz
  const viz = document.getElementById('packet-viz');
  let headers = [];
  if (s >= 1 && s <= maxStep) headers = layers.slice(0, s).map(l => l);
  else if (s > maxStep) headers = [...layers];
  viz.innerHTML = headers.map(l =>
    `<span class="pkt-seg" style="background:${l.color}22;border-color:${l.color}55;color:${l.color}">${l.header}</span>`
  ).join('');

  // Info text
  let info = 'Tap NEXT to begin packet transmission simulation.';
  if (s >= 1 && s <= maxStep) {
    info = `[SENDER L${layers[s-1].id}] ${layers[s-1].info}`;
  } else if (s === maxStep + 1) {
    info = '[NETWORK] Packet traversing the network cloud. Routers forward using IP headers.';
  } else if (s > maxStep + 1) {
    const ri = s - maxStep - 2;
    const rl = layers[maxStep - 1 - ri];
    if (rl) info = `[RECEIVER L${rl.id}] ${rl.info}`;
    else info = '[COMPLETE] Packet successfully delivered to destination application! ✓';
  }
  const infoEl = document.getElementById('info-text');
  typewriterInline(infoEl, info);

  document.getElementById('btn-back').disabled = s === 0;
  document.getElementById('btn-next').disabled = s >= total;
  if (s >= total) {
    try { localStorage.setItem('progress_osi', '100'); } catch(e){}
    sendToApp({ type:'topicDone', topic:'osi' });
  }
}

function typewriterInline(el, text) {
  el.textContent = '';
  let i = 0;
  const iv = setInterval(() => { el.textContent += text[i]; i++; if(i>=text.length) clearInterval(iv); }, 18);
}

function nextStep() {
  layers = currentModel === 'osi' ? OSI_LAYERS : TCPIP_LAYERS;
  const total = layers.length * 2 + 1;
  if (step < total) { step++; renderStep(step); }
}
function prevStep() { if (step > 0) { step--; renderStep(step); } }
function resetSim() { step = 0; challengeMode = false; challengeLayer = null; renderStep(0); }

function startChallenge() {
  layers = currentModel === 'osi' ? OSI_LAYERS : TCPIP_LAYERS;
  challengeMode = true;
  challengeLayer = layers[Math.floor(Math.random() * layers.length)].id;
  step = 0;
  renderStep(0);
  document.getElementById('info-text').textContent = '⚡ CHALLENGE: A layer is broken! Step through and tap the faulty layer to identify it.';
}

function handleLayerClick(layerId) {
  if (!challengeMode) return;
  const overlay = document.getElementById('challenge-overlay');
  const result = document.getElementById('challenge-result');
  if (layerId === challengeLayer) {
    result.innerHTML = `<h2 style="color:var(--accent-green)">✓ CORRECT!</h2><p>You identified the broken layer correctly. Network engineers call this systematic fault isolation.</p><button class="btn btn-secondary btn-full" onclick="closeChallenge()">CONTINUE</button>`;
    result.style.border = '1px solid var(--accent-green)';
    result.style.background = 'rgba(57,255,20,0.05)';
  } else {
    result.innerHTML = `<h2 style="color:var(--accent-red)">✗ WRONG</h2><p>That layer is functioning normally. Keep analyzing the packet flow to find the fault.</p><button class="btn btn-danger btn-full" onclick="closeChallenge()">TRY AGAIN</button>`;
    result.style.border = '1px solid var(--accent-red)';
    result.style.background = 'rgba(255,69,96,0.05)';
  }
  overlay.classList.add('show');
}

function closeChallenge() {
  document.getElementById('challenge-overlay').classList.remove('show');
  challengeMode = false; challengeLayer = null; resetSim();
}

// Init
setModel('osi');
</script>
</body>
</html>
