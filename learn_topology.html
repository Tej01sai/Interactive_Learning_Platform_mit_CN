<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Network Topology Builder — NETLEARN">
<title>Topology Builder — NETLEARN</title>
<link rel="stylesheet" href="style.css">
<style>
  .topology-badge { text-align:center; padding:8px 16px 4px; }
  .topo-pill { display:inline-block; font-family:var(--font-display); font-size:13px; font-weight:700; padding:8px 20px; border-radius:var(--radius-pill); border:2px solid var(--accent-blue); color:var(--accent-blue); background:rgba(0,212,255,0.08); letter-spacing:0.1em; box-shadow:var(--glow-blue); transition:all 0.3s; }
  .svg-canvas { display:block; width:100%; background:#050810; border-top:1px solid var(--border); border-bottom:1px solid var(--border); cursor:crosshair; }
  .toolbar { display:flex; gap:6px; padding:10px 16px; overflow-x:auto; scrollbar-width:none; }
  .toolbar::-webkit-scrollbar { display:none; }
  .tool-btn { display:flex; flex-direction:column; align-items:center; gap:3px; padding:8px 10px; border-radius:10px; border:1px solid var(--border); background:var(--bg-secondary); color:var(--text-muted); cursor:pointer; font-family:var(--font-display); font-size:8px; letter-spacing:0.06em; white-space:nowrap; transition:all 0.25s; flex-shrink:0; min-width:52px; }
  .tool-btn.active { border-color:var(--accent-blue); color:var(--accent-blue); background:rgba(0,212,255,0.1); box-shadow:0 0 10px rgba(0,212,255,0.2); }
  .tool-btn .tb-icon { font-size:16px; }
  .scores { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px 16px 0; }
  .score-row { background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; padding:10px; }
  .score-lbl { font-family:var(--font-display); font-size:9px; color:var(--text-muted); letter-spacing:0.1em; margin-bottom:6px; }
  .score-val { font-family:var(--font-mono); font-size:14px; margin-bottom:4px; }
  .status-panel { margin:8px 16px 0; background:var(--bg-secondary); border:1px solid var(--border); border-radius:10px; padding:10px; font-family:var(--font-mono); font-size:11px; color:var(--text-secondary); min-height:36px; }
</style>
</head>
<body>
<div class="screen">

  <div class="header">
    <a href="index.html" class="back-btn">‹</a>
    <h1>TOPOLOGY BUILDER</h1>
  </div>

  <div style="padding:8px 16px 0; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none;">
    <a href="learn_osi.html" class="chip">OSI</a>
    <a href="learn_ip.html" class="chip">IP</a>
    <span class="chip active">Topology</span>
    <a href="learn_routing.html" class="chip">Routing</a>
    <a href="learn_security.html" class="chip">Security</a>
  </div>

  <div class="topology-badge"><span class="topo-pill" id="topo-label">EMPTY NETWORK</span></div>

  <!-- SVG Canvas -->
  <svg id="svg-canvas" class="svg-canvas" height="280" viewBox="0 0 380 280" xmlns="http://www.w3.org/2000/svg">
    <!-- Grid lines -->
    <defs>
      <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,212,255,0.05)" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="380" height="280" fill="url(#grid)"/>
    <g id="edges-layer"></g>
    <g id="nodes-layer"></g>
  </svg>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tool-btn" id="tb-router" onclick="setTool('router')"><span class="tb-icon">⬡</span>ROUTER</button>
    <button class="tool-btn" id="tb-pc" onclick="setTool('pc')"><span class="tb-icon">💻</span>PC</button>
    <button class="tool-btn" id="tb-switch" onclick="setTool('switch')"><span class="tb-icon">⚡</span>SWITCH</button>
    <button class="tool-btn" id="tb-connect" onclick="setTool('connect')"><span class="tb-icon">—</span>CONNECT</button>
    <button class="tool-btn" id="tb-delete" onclick="setTool('delete')"><span class="tb-icon">✕</span>DELETE</button>
    <button class="tool-btn" id="tb-failure" onclick="setTool('failure')" style="border-color:rgba(255,69,96,0.3);color:var(--accent-red)"><span class="tb-icon">⚠</span>FAIL</button>
    <button class="tool-btn" onclick="resetAll()" style="border-color:rgba(255,179,71,0.3);color:var(--accent-amber)"><span class="tb-icon">↺</span>RESET</button>
  </div>

  <!-- Scores -->
  <div class="scores">
    <div class="score-row">
      <div class="score-lbl">COST EFFICIENCY</div>
      <div class="score-val" id="cost-val" style="color:var(--accent-green)">--</div>
      <div class="progress-wrap"><div class="progress-bar green" id="cost-bar" style="width:0%"></div></div>
    </div>
    <div class="score-row">
      <div class="score-lbl">FAULT TOLERANCE</div>
      <div class="score-val" id="fault-val" style="color:var(--accent-amber)">--</div>
      <div class="progress-wrap"><div class="progress-bar" id="fault-bar" style="width:0%;background:var(--accent-amber)"></div></div>
    </div>
  </div>

  <div class="status-panel" id="status-panel">Select a tool and tap the canvas to add devices.</div>

  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html"><div class="nav-icon">⬡</div><div class="nav-label">Learn</div></a>
    <a class="nav-item" href="tools_subnet.html"><div class="nav-icon">⚙</div><div class="nav-label">Tools</div></a>
    <a class="nav-item" href="quiz.html"><div class="nav-icon">◈</div><div class="nav-label">Quiz</div></a>
    <a class="nav-item" href="tutor.html"><div class="nav-icon">◎</div><div class="nav-label">Tutor</div></a>
  </nav>
</div>

<script src="utils.js"></script>
<script>
let nodes = [], edges = [], selectedTool = 'router', connectFirst = null, nodeIdCounter = 0;
const NODE_COLORS = { router:{ fill:'rgba(0,212,255,0.15)', stroke:'#00D4FF', glow:'rgba(0,212,255,0.6)' }, pc:{ fill:'rgba(57,255,20,0.15)', stroke:'#39FF14', glow:'rgba(57,255,20,0.6)' }, switch:{ fill:'rgba(255,179,71,0.15)', stroke:'#FFB347', glow:'rgba(255,179,71,0.6)' } };
const NODE_ICONS = { router:'⬡', pc:'◉', switch:'⚡' };

function setTool(t) {
  selectedTool = t; connectFirst = null;
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
  const el = document.getElementById('tb-'+t); if(el) el.classList.add('active');
  const msgs = { router:'Tap canvas to place a Router', pc:'Tap canvas to place a PC', switch:'Tap canvas to place a Switch', connect:'Tap two nodes to connect them', delete:'Tap a node to delete it', failure:'Tap a node to simulate failure' };
  document.getElementById('status-panel').textContent = msgs[t] || '';
}

function getSVGCoords(e) {
  const svg = document.getElementById('svg-canvas');
  const rect = svg.getBoundingClientRect();
  const scaleX = 380 / rect.width, scaleY = 280 / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

document.getElementById('svg-canvas').addEventListener('click', function(e) {
  if (e.target !== this && e.target.tagName !== 'rect' && !e.target.closest('#edges-layer') && e.target.closest('#nodes-layer')) return;
  if (['router','pc','switch'].includes(selectedTool)) {
    const {x,y} = getSVGCoords(e);
    addNode(selectedTool, x, y);
  }
});

function addNode(type, x, y) {
  const id = ++nodeIdCounter;
  nodes.push({id, type, x, y, failed:false, disconnected:false});
  renderSVG(); updateTopology();
}

function handleNodeClick(id) {
  if (selectedTool === 'delete') { deleteNode(id); return; }
  if (selectedTool === 'failure') { simulateFailure(id); return; }
  if (selectedTool === 'connect') {
    if (!connectFirst) { connectFirst = id; document.getElementById('status-panel').textContent = 'Now tap the second node to connect.'; }
    else if (connectFirst !== id) { connectNodes(connectFirst, id); connectFirst = null; document.getElementById('status-panel').textContent = 'Connected! Tap another pair to continue.'; }
    else connectFirst = null;
  }
}

function connectNodes(a, b) {
  if (!edges.find(e=>(e.from===a&&e.to===b)||(e.from===b&&e.to===a))) { edges.push({from:a,to:b}); renderSVG(); updateTopology(); }
}

function deleteNode(id) {
  nodes = nodes.filter(n=>n.id!==id);
  edges = edges.filter(e=>e.from!==id&&e.to!==id);
  renderSVG(); updateTopology();
}

function simulateFailure(id) {
  nodes.forEach(n=>{ n.failed=false; n.disconnected=false; });
  const failed = nodes.find(n=>n.id===id); if(!failed) return;
  failed.failed = true;
  // BFS from all non-failed nodes, using only non-failed edges
  const activeNodes = nodes.filter(n=>!n.failed).map(n=>n.id);
  const activeEdges = edges.filter(e=>e.from!==id&&e.to!==id);
  if (activeNodes.length === 0) { renderSVG(); return; }
  const visited = new Set(); const queue = [activeNodes[0]];
  while(queue.length) { const cur=queue.shift(); visited.add(cur); activeEdges.filter(e=>e.from===cur||e.to===cur).forEach(e=>{ const nb=e.from===cur?e.to:e.from; if(!visited.has(nb)&&activeNodes.includes(nb)) queue.push(nb); }); }
  nodes.forEach(n=>{ if(!n.failed && !visited.has(n.id)) n.disconnected=true; });
  renderSVG();
  const disconnCount = nodes.filter(n=>n.disconnected).length;
  document.getElementById('status-panel').textContent = disconnCount > 0 ? `⚠ ${disconnCount} device(s) lost connectivity after failure.` : '✓ Network remains connected after failure.';
  sendToApp({type:'topicDone',topic:'topology'});
}

function detectTopology() {
  if (nodes.length === 0) return 'EMPTY NETWORK';
  if (nodes.length === 1) return 'SINGLE NODE';
  if (nodes.length === 2 && edges.length === 1) return 'POINT-TO-POINT';
  const deg = {};
  nodes.forEach(n=>deg[n.id]=0);
  edges.forEach(e=>{ deg[e.from]++; deg[e.to]++; });
  const degs = Object.values(deg);
  const maxDeg = Math.max(...degs), minDeg = Math.min(...degs);
  const n = nodes.length, e = edges.length;
  if (degs.some(d=>d===n-1) && degs.filter(d=>d===1).length===n-1) return 'STAR';
  if (n*(n-1)/2 === e) return 'MESH (Full)';
  if (maxDeg===2 && minDeg===2) return 'RING';
  if (maxDeg<=2 && e===n-1) return 'BUS';
  return 'HYBRID';
}

function calcScores() {
  if (nodes.length < 2) return {cost:0, fault:0};
  const deg = {}; nodes.forEach(n=>deg[n.id]=0); edges.forEach(e=>{deg[e.from]++;deg[e.to]++;});
  const maxEdges = nodes.length * (nodes.length-1) / 2;
  const cost = Math.max(0, Math.round(100 - (edges.length / Math.max(1,maxEdges)) * 100));
  const minDeg = Math.min(...Object.values(deg));
  const fault = Math.min(100, Math.round((minDeg / Math.max(1,nodes.length-1)) * 100));
  return {cost, fault};
}

function updateTopology() {
  const topo = detectTopology();
  document.getElementById('topo-label').textContent = topo;
  const scores = calcScores();
  document.getElementById('cost-val').textContent = scores.cost + '%';
  document.getElementById('fault-val').textContent = scores.fault + '%';
  setTimeout(()=>{
    document.getElementById('cost-bar').style.width = scores.cost + '%';
    document.getElementById('fault-bar').style.width = scores.fault + '%';
  }, 100);
}

function renderSVG() {
  const el = document.getElementById('edges-layer');
  const nl = document.getElementById('nodes-layer');
  el.innerHTML = '';
  nl.innerHTML = '';

  // Draw edges
  edges.forEach(e=>{
    const a = nodes.find(n=>n.id===e.from), b = nodes.find(n=>n.id===e.to);
    if(!a||!b) return;
    const isFailed = a.failed||b.failed;
    const isDisc = a.disconnected||b.disconnected;
    const stroke = isFailed||isDisc ? 'rgba(61,79,107,0.5)' : 'rgba(0,212,255,0.5)';
    const dash = isFailed||isDisc ? '6,4' : '';
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',a.x); line.setAttribute('y1',a.y); line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
    line.setAttribute('stroke',stroke); line.setAttribute('stroke-width','1.5');
    if(dash) line.setAttribute('stroke-dasharray',dash);
    if(!isFailed&&!isDisc) line.setAttribute('filter','url(#blur)');
    el.appendChild(line);
  });

  // Draw nodes
  nodes.forEach(n=>{
    const c = NODE_COLORS[n.type];
    const stroke = n.failed ? '#FF4560' : (n.disconnected ? '#3D4F6B' : c.stroke);
    const fill = n.failed ? 'rgba(255,69,96,0.1)' : (n.disconnected ? 'rgba(61,79,107,0.1)' : c.fill);
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    g.style.cursor = 'pointer';
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('r','18'); circle.setAttribute('fill',fill); circle.setAttribute('stroke',stroke); circle.setAttribute('stroke-width','2');
    if(n.failed) { circle.setAttribute('filter','drop-shadow(0 0 6px rgba(255,69,96,0.8))'); }
    else if(!n.disconnected) { circle.setAttribute('filter',`drop-shadow(0 0 4px ${c.glow})`); }
    const text = document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('text-anchor','middle'); text.setAttribute('dominant-baseline','central');
    text.setAttribute('font-size','12'); text.setAttribute('fill',stroke); text.textContent = NODE_ICONS[n.type];
    const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('y','28'); lbl.setAttribute('font-size','8');
    lbl.setAttribute('fill','rgba(120,139,168,0.8)'); lbl.setAttribute('font-family','JetBrains Mono,monospace');
    lbl.textContent = n.type.toUpperCase() + n.id;
    g.appendChild(circle); g.appendChild(text); g.appendChild(lbl);
    g.addEventListener('click', (e)=>{ e.stopPropagation(); handleNodeClick(n.id); });
    nl.appendChild(g);
  });
}

function resetAll() { nodes=[]; edges=[]; nodeIdCounter=0; connectFirst=null; renderSVG(); updateTopology(); document.getElementById('status-panel').textContent='Network cleared. Select a tool to begin.'; }

setTool('router');
renderSVG();
updateTopology();
</script>
</body>
</html>
