<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Quiz</title>
<link rel="stylesheet" href="style.css">
<style>
  .question-card {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 14px;
    padding: 20px 18px;
    color: #e2e8f0;
    min-height: 110px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .question-num {
    font-size: 11px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .question-text {
    font-size: 15px;
    line-height: 1.6;
  }

  .option-btn {
    width: 100%;
    min-height: 52px;
    text-align: left;
    padding: 12px 16px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    line-height: 1.4;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .option-btn:active { transform: scale(0.98); }

  .option-btn .opt-letter {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--primary-light);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .option-btn.correct {
    background: #d1fae5;
    border-color: var(--secondary);
    color: #065f46;
  }

  .option-btn.correct .opt-letter { background: var(--secondary); color: #fff; }

  .option-btn.wrong {
    background: #fee2e2;
    border-color: var(--danger);
    color: #991b1b;
  }

  .option-btn.wrong .opt-letter { background: var(--danger); color: #fff; }

  .option-btn:disabled { cursor: default; }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 32px 0;
  }

  /* Score screen */
  .score-screen {
    text-align: center;
    padding: 20px 0;
  }

  .score-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: var(--primary-light);
    margin: 0 auto 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(83,74,183,0.2);
  }

  .score-circle .score-num {
    font-size: 34px;
    font-weight: 900;
    color: var(--primary);
    line-height: 1;
  }

  .score-circle .score-denom {
    font-size: 14px;
    color: var(--text-muted);
  }
</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <button class="back-btn" onclick="history.back()">&#8592;</button>
    <h1>AI Quiz</h1>
    <span class="badge badge-primary" style="margin-left:auto" id="progressBadge">0/10</span>
  </div>

  <div class="content">

    <!-- Setup screen -->
    <div id="setupScreen">
      <div class="card">
        <label class="label">Topic</label>
        <select class="input select" id="topicSelect">
          <option value="OSI Model">OSI Model</option>
          <option value="IP Addressing and Subnetting">IP Addressing</option>
          <option value="Network Topology">Network Topology</option>
          <option value="Routing protocols and algorithms">Routing</option>
          <option value="Network Security">Network Security</option>
          <option value="Computer Networks general">General CN</option>
        </select>
      </div>

      <div class="card">
        <label class="label">Difficulty</label>
        <div class="tab-bar">
          <button class="tab-btn active" id="diffEasy"   onclick="setDiff('Easy')">Easy</button>
          <button class="tab-btn"        id="diffMedium" onclick="setDiff('Medium')">Medium</button>
          <button class="tab-btn"        id="diffHard"   onclick="setDiff('Hard')">Hard</button>
        </div>
      </div>

      <div class="card">
        <label class="label">Number of Questions</label>
        <div class="tab-bar">
          <button class="tab-btn" onclick="setQCount(5)">5</button>
          <button class="tab-btn active" onclick="setQCount(10)">10</button>
          <button class="tab-btn" onclick="setQCount(15)">15</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="startQuiz()">Start Quiz →</button>
    </div>

    <!-- Quiz screen -->
    <div id="quizScreen" class="hidden" style="display:none;flex-direction:column;gap:14px">

      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-bar" id="quizProgress" style="width:0%"></div>
      </div>

      <!-- Score -->
      <div class="stat-row">
        <div class="stat-box">
          <div class="stat-val" id="correctCount">0</div>
          <div class="stat-lbl">Correct</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="wrongCount">0</div>
          <div class="stat-lbl">Wrong</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="qLeft">10</div>
          <div class="stat-lbl">Remaining</div>
        </div>
      </div>

      <!-- Loading -->
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <div class="text-muted text-sm">Generating question with AI…</div>
      </div>

      <!-- Error -->
      <div id="errorState" class="hidden">
        <div class="info-box red" id="errorMsg">Error generating question.</div>
        <button class="btn btn-outline btn-full mt-8" onclick="loadNextQuestion()">Retry</button>
      </div>

      <!-- Question -->
      <div id="questionArea" class="hidden" style="display:none;flex-direction:column;gap:10px">
        <div class="question-card">
          <div class="question-num" id="questionNum">Question 1</div>
          <div class="question-text" id="questionText"></div>
        </div>
        <div id="optionList" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>

      <!-- Explanation -->
      <div id="explanationBox" class="hidden"></div>

      <!-- Next button -->
      <button class="btn btn-primary btn-full hidden" id="btnNext" onclick="loadNextQuestion()">Next Question →</button>

    </div>

    <!-- Score screen -->
    <div id="scoreScreen" class="hidden" style="display:none">
      <div class="score-screen">
        <div class="score-circle">
          <div class="score-num" id="finalScore">0</div>
          <div class="score-denom" id="finalDenom">/ 10</div>
        </div>
        <div class="fw-700" style="font-size:18px" id="scoreLabel">Well done!</div>
        <div class="text-muted text-sm mt-4" id="scoreMsg"></div>
      </div>

      <div class="btn-row mt-12">
        <button class="btn btn-primary" onclick="startQuiz()">Try Again</button>
        <button class="btn btn-outline" onclick="showSetup()">Change Topic</button>
      </div>
    </div>

  </div>
</div>

<script src="config.js"></script>
<script src="utils.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────

let difficulty = 'Easy';
let questionCount = 10;
let questionNum = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

// ── Setup ─────────────────────────────────────────────────────

function setDiff(d) {
  difficulty = d;
  ['Easy','Medium','Hard'].forEach(x => {
    el(`diff${x}`).classList.toggle('active', x === d);
  });
}

function setQCount(n) {
  questionCount = n;
  document.querySelectorAll('#setupScreen .tab-bar:last-of-type .tab-btn').forEach((b, i) => {
    b.classList.toggle('active', [5,10,15][i] === n);
  });
}

function showSetup() {
  el('setupScreen').classList.remove('hidden');
  el('quizScreen').style.display = 'none';
  el('quizScreen').classList.add('hidden');
  el('scoreScreen').style.display = 'none';
  el('scoreScreen').classList.add('hidden');
}

function startQuiz() {
  questionNum = 0;
  correctCount = 0;
  wrongCount = 0;
  answered = false;

  el('setupScreen').classList.add('hidden');
  el('scoreScreen').style.display = 'none';
  el('scoreScreen').classList.add('hidden');
  el('quizScreen').style.display = 'flex';
  el('quizScreen').classList.remove('hidden');

  updateStats();
  loadNextQuestion();
}

function updateStats() {
  el('correctCount').textContent = correctCount;
  el('wrongCount').textContent = wrongCount;
  el('qLeft').textContent = Math.max(0, questionCount - questionNum);
  el('progressBadge').textContent = `${questionNum}/${questionCount}`;
  el('quizProgress').style.width = `${(questionNum / questionCount) * 100}%`;
}

// ── Question generation ───────────────────────────────────────

async function generateQuestion() {
  const topic = el('topicSelect').value;

  const prompt = `Generate 1 multiple choice question about ${topic} in Computer Networks.
Difficulty: ${difficulty}.
Return ONLY valid JSON in this exact format with no markdown, no code blocks, no extra text:
{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"answer":"A","explanation":"..."}`;

  const text = await callGemini([{ role: 'user', parts: [{ text: prompt }] }]);

  // Strip any markdown fences if present
  const cleaned = text.replace(/```json|```/g, '').trim();
  const json = JSON.parse(cleaned);

  // Validate structure
  if (!json.question || !Array.isArray(json.options) || !json.answer || !json.explanation) {
    throw new Error('Invalid response format from AI');
  }

  return json;
}

async function loadNextQuestion() {
  questionNum++;
  answered = false;

  if (questionNum > questionCount) {
    showScoreScreen();
    return;
  }

  el('questionNum').textContent = `Question ${questionNum} of ${questionCount}`;
  el('btnNext').classList.add('hidden');
  hide('explanationBox');
  hide('errorState');

  // Show loading
  show('loadingState');
  el('questionArea').style.display = 'none';
  el('questionArea').classList.add('hidden');

  updateStats();

  try {
    const q = await generateQuestion();
    displayQuestion(q);
  } catch (err) {
    hide('loadingState');
    show('errorState');
    el('errorMsg').textContent = `Error: ${err.message}. Check your API key in config.js.`;
  }
}

function displayQuestion(q) {
  hide('loadingState');

  el('questionText').textContent = q.question;
  el('questionArea').style.display = 'flex';
  el('questionArea').classList.remove('hidden');

  const optList = el('optionList');
  optList.innerHTML = '';

  q.options.forEach((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<div class="opt-letter">${letter}</div><div>${opt.replace(/^[A-D]\.\s*/, '')}</div>`;
    btn.onclick = () => selectAnswer(letter, q.answer, q.explanation, optList);
    optList.appendChild(btn);
  });
}

function selectAnswer(selected, correct, explanation, optList) {
  if (answered) return;
  answered = true;

  const isCorrect = selected === correct;
  if (isCorrect) correctCount++; else wrongCount++;

  // Highlight options
  Array.from(optList.children).forEach((btn, i) => {
    const letter = String.fromCharCode(65 + i);
    btn.disabled = true;
    if (letter === correct) btn.classList.add('correct');
    else if (letter === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Explanation
  const expBox = el('explanationBox');
  expBox.classList.remove('hidden');
  expBox.innerHTML = `<div class="info-box ${isCorrect ? 'teal' : 'red'}">
    ${isCorrect ? '✅ Correct!' : `❌ The correct answer is <strong>${correct}</strong>.`}
    <br><br>${explanation}
  </div>`;

  // Next
  el('btnNext').classList.remove('hidden');
  el('btnNext').textContent = questionNum >= questionCount ? 'See Results' : 'Next Question →';

  updateStats();
  localStorage.setItem('quizScore', correctCount);
  sendToApp({ type: 'quizScore', value: correctCount });
}

// ── Score screen ──────────────────────────────────────────────

function showScoreScreen() {
  el('quizScreen').style.display = 'none';
  el('quizScreen').classList.add('hidden');

  el('scoreScreen').style.display = 'block';
  el('scoreScreen').classList.remove('hidden');

  el('finalScore').textContent = correctCount;
  el('finalDenom').textContent = `/ ${questionCount}`;

  const pct = (correctCount / questionCount) * 100;
  const label = pct >= 80 ? '🎉 Excellent!' : pct >= 60 ? '👍 Good job!' : pct >= 40 ? '📚 Keep studying!' : '💪 Try again!';
  const msg   = pct >= 80 ? 'You have a strong grasp of this topic.' :
                pct >= 60 ? 'Good understanding — review the questions you missed.' :
                'Review the material and try again to improve your score.';

  el('scoreLabel').textContent = label;
  el('scoreMsg').textContent = msg;
  el('progressBadge').textContent = `${correctCount}/${questionCount}`;
}
</script>
</body>
</html>
